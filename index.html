<!DOCTYPE html>

<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Segoe UI","DM Sans",system-ui,sans-serif;background:#f5f7fa;color:#1a1a2e;line-height:1.5}.container{max-width:680px;margin:0 auto;padding:24px 16px}h1{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px}h2{font-size:15px;font-weight:500;color:#666;text-align:center;margin:0 0 24px}.field-label{font-size:14px;font-weight:600;display:block;margin-bottom:8px}.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:24px;margin-bottom:20px}.axis-title{font-size:18px;font-weight:800;margin-bottom:4px}.axis-desc{font-size:12px;color:#888;margin-bottom:16px}.question{margin-bottom:20px}.q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}.levels{display:flex;gap:6px;flex-wrap:wrap}.lvl-btn{padding:8px 14px;border-radius:8px;border:2px solid #e2e2e2;background:#fff;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:inherit}.lvl-btn.active{font-weight:700}.lvl-btn:hover{border-color:#ccc}.result-box{text-align:center;padding:32px 24px;border-radius:16px;margin-bottom:20px}.score-big{font-size:56px;font-weight:900;line-height:1}.score-unit{font-size:22px;font-weight:400}.badge{display:inline-block;padding:6px 20px;border-radius:99px;font-weight:700;font-size:14px;color:#fff;margin-top:12px}.bar-track{background:#f0f0f0;border-radius:99px;height:12px;width:100%;overflow:hidden}.bar-fill{height:12px;border-radius:99px;transition:width .5s}.axis-result{margin-bottom:16px}.axis-result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.axis-result-name{font-size:14px;font-weight:600}.axis-result-score{font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}.reco{padding:16px;border-radius:12px;margin-bottom:12px;border-left:4px solid}.reco-title{font-size:14px;font-weight:700;margin-bottom:4px}.reco-text{font-size:13px;color:#555;line-height:1.6}.nav{display:flex;gap:12px;justify-content:space-between;margin-top:16px}.btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:2px solid #e2e2e2;background:#fff}.btn-primary{border:none;background:linear-gradient(135deg,#1e3a8a,#166534);color:#fff;font-weight:700}.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}.progress{margin-bottom:24px}.mode-row{display:flex;gap:12px;margin-bottom:24px}.mode-btn{flex:1;padding:16px;border-radius:12px;border:2px solid #e2e2e2;background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}.mode-btn.active{border-color:#1e3a8a;background:rgba(30,58,138,0.03)}.mode-btn h3{font-size:16px;margin:0}.mode-btn p{font-size:12px;color:#888;margin:4px 0 0}.company-input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #e2e2e2;font-size:15px;font-family:inherit;margin-bottom:20px}.company-input:focus{outline:none;border-color:#1e3a8a}.axis-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:2px solid #e8e8e8;margin-bottom:6px;cursor:pointer;transition:all .2s;background:#fff}.axis-row:hover{border-color:#ccc}.axis-sel{}.axis-check{width:22px;height:22px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}.axis-row-name{font-size:14px;font-weight:600;flex:1}.axis-row-count{font-size:11px;color:#888;background:#f5f5f5;padding:3px 10px;border-radius:99px}.sel-actions{display:flex;gap:8px;margin-bottom:10px}.sel-btn{padding:5px 12px;border-radius:8px;border:1px solid #e2e2e2;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#666;font-family:inherit}.sel-btn:hover{background:#f5f5f5}.export-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #e2e2e2;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:50}.export-opt{width:100%;padding:14px 16px;border:none;border-bottom:1px solid #f0f0f0;background:transparent;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;font-size:14px;font-family:inherit}.export-opt:hover{background:#f8f8f8}.export-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.export-label{font-weight:700;color:#1a1a2e}.export-sub{font-size:12px;color:#888;margin-top:2px}.scale-item{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;font-size:12px;line-height:1.5}.scale-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}.scale-label{font-weight:700;white-space:nowrap}.scale-desc{color:#666}.info-tip{position:relative;display:inline-flex;align-items:center;cursor:help;vertical-align:middle;margin-left:4px}.info-bubble{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.5;width:260px;max-width:80vw;box-shadow:0 4px 20px rgba(0,0,0,0.18);z-index:100;text-align:left;font-weight:400}.info-arrow{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #1a1a2e}@media print{body{background:#fff}.btn,.nav,.progress,.export-dropdown,.sel-actions{display:none!important}}</style>

<script>
var ALL_AXES = [{"id":"gouvernance","name":"Gouvernance & Stratégie RH","color":"#1e3a8a","desc":"Évalue la manière dont la stratégie RH est définie, pilotée et alignée sur les objectifs globaux de l'entreprise : instances de décision, sponsoring de la direction, budget dédié et dialogue social.","questions":[{"id":"g1","text":"Comment qualifieriez-vous la formalisation de votre stratégie RH et son alignement avec la stratégie globale de l'entreprise ?","flash":true},{"id":"g2","text":"Où en est votre organisation concernant le pilotage de la GEPP (comité compétences, comité carrières…) ?","flash":true},{"id":"g3","text":"Comment évalueriez-vous le suivi régulier de vos indicateurs RH clés (turnover, mobilité, couverture de compétences) ?","flash":true},{"id":"g4","text":"Dans quelle mesure la direction générale porte-t-elle et sponsorise-t-elle la démarche compétences ?","flash":false},{"id":"g5","text":"Comment qualifieriez-vous l'identification et la sanctuarisation d'un budget dédié aux compétences (formation, outils, conseil) ?","flash":false},{"id":"g6","text":"Où en êtes-vous dans la construction d'une roadmap pluriannuelle de transformation des compétences ?","flash":false},{"id":"g7","text":"Comment décririez-vous l'implication des partenaires sociaux dans la démarche GEPP (accord, charte, instances…) ?","flash":false},{"id":"g8","text":"Dans quelle mesure la fonction RH dispose-t-elle de ressources dédiées à l'ingénierie des compétences (hors administration courante) ?","flash":false}]},{"id":"referentiels","name":"Référentiels de compétences","color":"#2563eb","desc":"Mesure l'existence, la complétude et la mise à jour des référentiels de compétences : couverture métier, niveaux de maîtrise, intégration des compétences émergentes et appropriation par les collaborateurs.","questions":[{"id":"r1","text":"Comment qualifieriez-vous la couverture de votre référentiel de compétences sur l'ensemble des métiers de l'organisation ?","flash":true},{"id":"r2","text":"Dans quelle mesure votre référentiel distingue-t-il compétences techniques, transverses et comportementales ?","flash":true},{"id":"r3","text":"Comment évalueriez-vous le processus de mise à jour régulière de votre référentiel de compétences ?","flash":true},{"id":"r4","text":"Où en êtes-vous dans l'intégration de niveaux de maîtrise attendus par compétence dans vos fiches métiers ?","flash":false},{"id":"r5","text":"Comment qualifieriez-vous la prise en compte des compétences émergentes (IA, data, transition écologique…) dans votre référentiel ?","flash":false},{"id":"r6","text":"Dans quelle mesure les managers et collaborateurs contribuent-ils à la construction et à la mise à jour du référentiel ?","flash":false},{"id":"r7","text":"Comment décririez-vous l'accessibilité et la compréhension du référentiel par l'ensemble des collaborateurs ?","flash":false},{"id":"r8","text":"Où en est votre organisation concernant l'existence d'un dictionnaire de compétences avec des descripteurs comportementaux par niveau ?","flash":false}]},{"id":"processus","name":"Processus","color":"#3b82f6","desc":"Analyse la structuration des processus RH clés : entretiens, people review, mobilité interne, cartographie des emplois, salary review et conformité à la directive européenne sur la transparence des rémunérations.","questions":[{"id":"p1","text":"Comment qualifieriez-vous l'intégration de l'évaluation des compétences dans vos entretiens annuels et professionnels ?","flash":true},{"id":"p2","text":"Où en est votre organisation concernant la structuration d'un processus de revue des talents (people review) ?","flash":true},{"id":"p3","text":"Dans quelle mesure votre processus de salary review est-il formalisé, objectivé et articulé avec l'évaluation des compétences et de la performance ?","flash":true},{"id":"p4","text":"Comment évalueriez-vous votre dispositif de détection et de gestion des hauts potentiels ?","flash":false},{"id":"p5","text":"Comment décririez-vous la formalisation et la communication des parcours de mobilité interne ?","flash":false},{"id":"p6","text":"Où en êtes-vous dans la construction d'une cartographie dynamique des emplois sensibles, en tension et émergents ?","flash":false},{"id":"p7","text":"Dans quelle mesure votre organisation est-elle préparée aux exigences de la directive européenne sur la transparence des rémunérations (grilles salariales, critères objectifs, reporting des écarts) ?","flash":false},{"id":"p8","text":"Comment qualifieriez-vous le traitement des écarts entre compétences détenues et compétences cibles (plans d'action individuels) ?","flash":false}]},{"id":"planification","name":"Planification","color":"#0891b2","desc":"Analyse la capacité de l'organisation à anticiper ses besoins en ressources et compétences : planification annuelle, workforce planning, scénarios prospectifs et prise en compte des départs prévisibles.","questions":[{"id":"pl1","text":"Comment évalueriez-vous la formalisation de votre processus de planification annuelle (budget, effectifs, compétences) ?","flash":true},{"id":"pl2","text":"Dans quelle mesure votre planification RH intègre-t-elle les évolutions prévisibles de l'activité ?","flash":true},{"id":"pl3","text":"Où en est votre organisation concernant la modélisation de scénarios prospectifs (croissance, décroissance, transformation) ?","flash":true},{"id":"pl4","text":"Comment qualifieriez-vous l'articulation entre votre workforce planning et le plan stratégique de l'entreprise ?","flash":false},{"id":"pl5","text":"Comment décririez-vous l'anticipation de vos besoins en recrutement et en mobilité à horizon 12-36 mois ?","flash":false},{"id":"pl6","text":"Dans quelle mesure les départs prévisibles (retraites, turnover structurel) sont-ils intégrés à votre planification ?","flash":false},{"id":"pl7","text":"Où en êtes-vous dans l'utilisation d'outils de simulation et de modélisation pour la planification des effectifs ?","flash":false},{"id":"pl8","text":"Comment évalueriez-vous votre capacité à réviser et ajuster la planification en cours d'année ?","flash":false}]},{"id":"operations","name":"Opérations","color":"#0d9488","desc":"Mesure la maturité des processus opérationnels : standardisation, indicateurs de performance, amélioration continue, clarté des rôles et coordination inter-fonctions.","questions":[{"id":"op1","text":"Comment qualifieriez-vous la documentation et la standardisation de vos processus opérationnels clés ?","flash":true},{"id":"op2","text":"Où en est votre organisation concernant le suivi d'indicateurs de performance opérationnelle (productivité, qualité, délais) ?","flash":true},{"id":"op3","text":"Dans quelle mesure les compétences de vos équipes opérationnelles sont-elles en adéquation avec les objectifs fixés ?","flash":true},{"id":"op4","text":"Comment évalueriez-vous le déploiement de démarches d'amélioration continue (Lean, Kaizen, Six Sigma…) ?","flash":false},{"id":"op5","text":"Comment décririez-vous la clarté et la communication des rôles et responsabilités au sein des équipes opérationnelles ?","flash":false},{"id":"op6","text":"Dans quelle mesure les retours terrain (incidents, non-conformités, suggestions) sont-ils collectés et exploités de façon systématique ?","flash":false},{"id":"op7","text":"Où en êtes-vous concernant l'audit et l'optimisation régulière de vos processus opérationnels ?","flash":false},{"id":"op8","text":"Comment qualifieriez-vous la fluidité de la coordination entre vos fonctions opérationnelles (production, logistique, qualité…) ?","flash":false}]},{"id":"outils","name":"Outils & Digitalisation","color":"#059669","desc":"Évalue le niveau d'outillage digital au service de la gestion des compétences : SIRH, LMS, tableaux de bord, analytique RH, interopérabilité et fiabilité des données.","questions":[{"id":"o1","text":"Comment évalueriez-vous votre SIRH en matière de gestion des compétences ?","flash":true},{"id":"o2","text":"Où en est votre organisation concernant la possibilité pour les collaborateurs d'auto-évaluer et déclarer leurs compétences via un outil digital ?","flash":true},{"id":"o3","text":"Comment qualifieriez-vous vos tableaux de bord RH pour le pilotage de la GEPP ?","flash":true},{"id":"o4","text":"Dans quelle mesure votre LMS (plateforme de formation) est-il en place et connecté aux besoins en compétences ?","flash":false},{"id":"o5","text":"Où en êtes-vous dans l'utilisation de l'IA ou de l'analytique RH pour anticiper les besoins en compétences ?","flash":false},{"id":"o6","text":"Comment décririez-vous la couverture digitale du cycle complet : évaluation → analyse des écarts → plan de développement ?","flash":false},{"id":"o7","text":"Comment évalueriez-vous la fiabilité et l'exploitabilité de vos données compétences pour la prise de décision ?","flash":false},{"id":"o8","text":"Dans quelle mesure vos outils RH (SIRH, LMS, ATS, BI…) sont-ils interconnectés et interopérables ?","flash":false}]},{"id":"techno_ia","name":"Technologies / IA","color":"#15803d","desc":"Évalue la maturité technologique de l'organisation, l'identification des impacts de l'IA sur les métiers et les compétences, l'acculturation des collaborateurs et la stratégie de reskilling/upskilling associée.","questions":[{"id":"ti1","text":"Comment qualifieriez-vous la maturité technologique globale de votre organisation (outils collaboratifs, automatisation, cloud, données) ?","flash":true},{"id":"ti2","text":"Où en est votre organisation concernant l'identification des impacts de l'IA sur ses métiers et ses emplois ?","flash":true},{"id":"ti3","text":"Dans quelle mesure vos collaborateurs sont-ils formés ou sensibilisés aux usages de l'IA dans leur activité quotidienne ?","flash":true},{"id":"ti4","text":"Comment évalueriez-vous l'intégration de l'IA dans vos processus RH (recrutement, formation, gestion des talents, workforce planning) ?","flash":false},{"id":"ti5","text":"Comment décririez-vous votre capacité à anticiper les compétences rendues obsolètes ou émergentes du fait des technologies et de l'IA ?","flash":false},{"id":"ti6","text":"Où en êtes-vous dans la définition d'un cadre éthique et de gouvernance pour l'usage de l'IA dans l'organisation ?","flash":false},{"id":"ti7","text":"Dans quelle mesure les managers sont-ils outillés pour accompagner leurs équipes dans la transformation liée à l'IA ?","flash":false},{"id":"ti8","text":"Comment qualifieriez-vous votre stratégie de reskilling / upskilling face aux transformations technologiques en cours ?","flash":false}]},{"id":"pilotage","name":"Pilotage stratégique","color":"#166534","desc":"Évalue la capacité de pilotage au niveau stratégique : déclinaison de la vision en objectifs, revues stratégiques, tableaux de bord, gestion des risques et alignement stratégie-organisation-compétences.","questions":[{"id":"ps1","text":"Comment qualifieriez-vous la déclinaison de votre vision stratégique en objectifs mesurables et communiqués à tous les niveaux ?","flash":true},{"id":"ps2","text":"Où en est votre organisation concernant la tenue de revues stratégiques régulières (trimestrielles ou semestrielles) ?","flash":true},{"id":"ps3","text":"Dans quelle mesure vos décisions stratégiques s'appuient-elles sur des données fiables et actualisées ?","flash":true},{"id":"ps4","text":"Comment évalueriez-vous votre tableau de bord stratégique (balanced scorecard ou équivalent) ?","flash":false},{"id":"ps5","text":"Comment décririez-vous l'évaluation périodique de l'alignement entre stratégie, organisation et compétences ?","flash":false},{"id":"ps6","text":"Où en êtes-vous dans la cartographie et le suivi de vos risques stratégiques (marché, réglementaire, technologique, RH) ?","flash":false},{"id":"ps7","text":"Dans quelle mesure le CODIR/COMEX dispose-t-il d'une vision consolidée de la maturité organisationnelle ?","flash":false},{"id":"ps8","text":"Comment qualifieriez-vous l'évaluation régulière de votre capacité d'exécution stratégique (ressources, compétences, gouvernance) ?","flash":false}]}];
var LEVELS = [{"score":1,"label":"Inexistant","color":"#e74c3c","desc":"Aucune pratique en place"},{"score":2,"label":"Initié","color":"#e67e22","desc":"Premières initiatives, non structurées"},{"score":3,"label":"Formalisé","color":"#f1c40f","desc":"Processus définis et documentés"},{"score":4,"label":"Piloté","color":"#2ecc71","desc":"Processus mesurés et améliorés"},{"score":5,"label":"Optimisé","color":"#1abc9c","desc":"Amélioration continue, référence"}];
var RECO = {"gouvernance":{"1":["Formaliser une stratégie RH écrite et la présenter en CODIR.","Nommer un sponsor exécutif de la démarche compétences.","Définir 3 à 5 KPI RH prioritaires à suivre mensuellement."],"2":["Structurer un comité de pilotage GEPP trimestriel avec des objectifs mesurables.","Lancer un premier budget sanctuarisé pour la gestion des compétences.","Engager le dialogue social autour d'un accord GEPP."],"3":["Renforcer l'alignement stratégie business ↔ stratégie compétences avec des revues croisées.","Négocier un accord GEPP avec les IRP et formaliser une charte.","Déployer une roadmap compétences pluriannuelle validée par la DG."],"4":["Affiner le pilotage par les données et automatiser le reporting des KPI RH.","Challenger la roadmap compétences lors de chaque revue stratégique.","Étendre le sponsoring de la démarche à l'ensemble du CODIR."],"5":["Mener un benchmark externe régulier sur les pratiques de gouvernance RH.","Innover dans les modèles de gouvernance (comités agiles, OKR compétences).","Partager les bonnes pratiques en réseau sectoriel ou interprofessionnel."]},"referentiels":{"1":["Construire un référentiel simplifié sur les 5 à 10 emplois clés.","Distinguer dès le départ compétences techniques et transverses.","Privilégier l'opérationnel et l'utilisabilité à l'exhaustivité."],"2":["Compléter le référentiel avec des niveaux de maîtrise par compétence.","Intégrer les compétences transverses (soft skills, digital).","Rendre le référentiel accessible à tous les collaborateurs."],"3":["Impliquer les managers dans la mise à jour annuelle du référentiel.","Intégrer les compétences émergentes (IA, green skills, data).","Élaborer un dictionnaire de compétences avec descripteurs comportementaux."],"4":["Automatiser la mise à jour du référentiel via le SIRH.","Lier le référentiel aux processus d'évaluation, de formation et de recrutement.","Mesurer le taux de couverture et d'appropriation par les équipes."],"5":["Rendre le référentiel prédict var selectedAxes = ALL_AXES.map(function(a){ return a.id; });
var answers = {};
var currentAxis = 0, currentQ = 0, screen = "home", mode = "flash", company = "";
var showExportMenu = false;

function getActiveAxes() { return ALL_AXES.filter(function(a){ return selectedAxes.indexOf(a.id) !== -1; }); }
function getQs(a) { return mode === "flash" ? a.questions.filter(function(q) { return q.flash; }) : a.questions; }
function getLevelInfo(s) { var c = Math.max(1, Math.min(5, Math.round(s))); return LEVELS[c - 1]; }
function getGlobalLevel(a) { if (a<=1.5) return LEVELS[0]; if (a<=2.5) return LEVELS[1]; if (a<=3.5) return LEVELS[2]; if (a<=4.5) return LEVELS[3]; return LEVELS[4]; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function infoIcon(color, desc) {
  return '<span class="info-tip" onmouseenter="this.querySelector(&#39;.info-bubble&#39;).style.display=&#39;block&#39;" onmouseleave="this.querySelector(&#39;.info-bubble&#39;).style.display=&#39;none&#39;" onclick="event.stopPropagation();var b=this.querySelector(&#39;.info-bubble&#39;);b.style.display=b.style.display===&#39;block&#39;?&#39;none&#39;:&#39;block&#39;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="'+color+'" stroke-width="2" fill="'+color+'12"/><text x="12" y="16.5" text-anchor="middle" font-size="13" font-weight="700" fill="'+color+'">i</text></svg><div class="info-bubble">'+esc(desc)+'<div class="info-arrow"></div></div></span>';
}
function getTotalQs() { return getActiveAxes().reduce(function(s,a){return s+getQs(a).length},0); }

function toggleAxis(id) {
  var idx = selectedAxes.indexOf(id);
  if (idx === -1) selectedAxes.push(id);
  else selectedAxes.splice(idx, 1);
  render();
}
function selectAll() { selectedAxes = ALL_AXES.map(function(a){ return a.id; }); render(); }
function selectNone() { selectedAxes = []; render(); }

function doAnswer(qid, score) {
  answers[qid] = score;
  var active = getActiveAxes();
  setTimeout(function() {
    var qs = getQs(active[currentAxis]);
    if (currentQ < qs.length - 1) currentQ++;
    else if (currentAxis < active.length - 1) { currentAxis++; currentQ = 0; }
    render();
  }, 200);
}
function goPrev() { var active = getActiveAxes(); if (currentQ > 0) currentQ--; else if (currentAxis > 0) { currentAxis--; currentQ = getQs(active[currentAxis]).length - 1; } render(); }
function goNext() { var active = getActiveAxes(); var qs = getQs(active[currentAxis]); if (currentQ < qs.length - 1) currentQ++; else if (currentAxis < active.length - 1) { currentAxis++; currentQ = 0; } render(); }
function showResults() { screen = "results"; showExportMenu = false; render(); }
function goHome() { screen = "home"; answers = {}; currentAxis = 0; currentQ = 0; showExportMenu = false; render(); }
function setMode(m) { mode = m; render(); }
function startQuiz() { if (selectedAxes.length === 0) return; answers = {}; currentAxis = 0; currentQ = 0; screen = "quiz"; render(); }
function setCompany(v) { company = v; }
function toggleExport() { showExportMenu = !showExportMenu; render(); }

function computeResults() {
  return getActiveAxes().map(function(a) {
    var sc = getQs(a).map(function(q){return answers[q.id]||0}).filter(function(s){return s>0});
    var avg = sc.length ? sc.reduce(function(x,y){return x+y},0)/sc.length : 0;
    return {id:a.id,name:a.name,color:a.color,desc:a.desc,questions:a.questions,avg:Math.round(avg*100)/100,level:getLevelInfo(avg)};
  });
}

function drawRadar(results) {
  var cx=160,cy=160,r=120,n=results.length;
  if (n < 3) return "";
  var svg='<svg viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:400px;display:block;margin:0 auto">';
  for(var g=1;g<=5;g++){var gr=r*g/5;svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+gr+'" fill="none" stroke="#e0e0e0" stroke-width="1"/>';}
  for(var i=0;i<n;i++){
    var angle=(Math.PI*2*i/n)-Math.PI/2;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x2+'" y2="'+y2+'" stroke="#e0e0e0" stroke-width="1"/>';
    var lx=cx+(r+25)*Math.cos(angle),ly=cy+(r+25)*Math.sin(angle);
    var anchor="middle";if(lx<cx-10)anchor="end";else if(lx>cx+10)anchor="start";
    var shortName=results[i].name.split("&")[0].split(" ").slice(0,2).join(" ");
    svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="'+anchor+'" font-size="10" font-weight="600" fill="#555" dominant-baseline="central">'+shortName+'</text>';
  }
  var points=[];
  for(var i=0;i<n;i++){var angle=(Math.PI*2*i/n)-Math.PI/2;var val=results[i].avg/5;points.push((cx+r*val*Math.cos(angle)).toFixed(1)+","+(cy+r*val*Math.sin(angle)).toFixed(1));}
  svg+='<polygon points="'+points.join(" ")+'" fill="rgba(30,58,138,0.15)" stroke="#1e3a8a" stroke-width="2"/>';
  for(var i=0;i<n;i++){var angle=(Math.PI*2*i/n)-Math.PI/2;var val=results[i].avg/5;svg+='<circle cx="'+(cx+r*val*Math.cos(angle)).toFixed(1)+'" cy="'+(cy+r*val*Math.sin(angle)).toFixed(1)+'" r="4" fill="#1e3a8a"/>';}
  svg+='</svg>';return svg;
}

function exportCSV(results,globalAvg,globalLevel,dt){
  var sep=";",lines=[];
  lines.push("Diagnostic de Maturite GEPP / SBO");
  lines.push(company?"Entreprise"+sep+company:"");
  lines.push("Date"+sep+dt);lines.push("Mode"+sep+(mode==="flash"?"Flash":"Complet"));
  lines.push("Score global"+sep+globalAvg.toFixed(2)+"/5"+sep+globalLevel.label);lines.push("");
  lines.push("Axe"+sep+"Score"+sep+"Niveau"+sep+"Recommandation");
  results.forEach(function(r){var lvl=Math.max(1,Math.min(5,Math.round(r.avg)));lines.push(r.name+sep+r.avg.toFixed(2)+"/5"+sep+r.level.label+sep+RECO[r.id][String(lvl)]);});
  lines.push("");lines.push("Question"+sep+"Axe"+sep+"Reponse"+sep+"Niveau");
  results.forEach(function(r){getQs(r).forEach(function(q){var score=answers[q.id]||0;var li=score>0?getLevelInfo(score).label:"Non repondu";lines.push('"'+q.text+'"'+sep+r.name+sep+score+"/5"+sep+li);});});
  var blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;
  a.download="diagnostic-maturite"+(company?"-"+company.replace(/\s+/g,"-").toLowerCase():"")+".csv";a.click();URL.revokeObjectURL(url);
}

function generateSynthesis(globalAvg) {
  if (globalAvg<1.5) return "Tout est \u00e0 construire.";
  if (globalAvg<2.5) return "Fondamentaux \u00e0 poser d'urgence.";
  if (globalAvg<3.5) return "Structuration en cours, acc\u00e9l\u00e9rer.";
  if (globalAvg<4.5) return "Maturit\u00e9 solide, piloter l'excellence.";
  return "Organisation r\u00e9f\u00e9rente, innover.";
}

function generateSWOT(results, globalAvg) {
  var sorted = results.slice().sort(function(a,b){return b.avg-a.avg});
  var strong = results.filter(function(r){return r.avg>=3.5});
  var weak = results.filter(function(r){return r.avg<3});
  var mid = results.filter(function(r){return r.avg>=3&&r.avg<3.5});
  var gap = sorted[0].avg - sorted[sorted.length-1].avg;

  var atouts = [];
  if (strong.length>0) atouts.push("Points forts sur " + strong.map(function(r){return r.name+" ("+r.avg.toFixed(1)+")"}).join(", ") + " \u2014 socle de maturit\u00e9 de l'organisation.");
  else atouts.push("Aucun axe consolid\u00e9 \u2014 la marge de progression est importante.");
  atouts.push(globalAvg>=3 ? "Score global de "+globalAvg.toFixed(1)+"/5 : dynamique de structuration engag\u00e9e." : "La prise de conscience du diagnostic est un premier atout.");

  var fragilites = [];
  if (weak.length>0) fragilites.push("Axes critiques : " + weak.map(function(r){return r.name+" ("+r.avg.toFixed(1)+")"}).join(", ") + ".");
  else fragilites.push("Aucun axe critique, mais les axes sous 3.5/5 restent fragiles.");
  fragilites.push(gap>1.5 ? "\u00c9cart de "+gap.toFixed(1)+" pts entre axes \u2014 risque de transformation \u00e0 deux vitesses." : "\u00c9cart limit\u00e9 ("+gap.toFixed(1)+" pts) \u2014 progression \u00e9quilibr\u00e9e mais \u00e0 acc\u00e9l\u00e9rer.");

  var leviers = [];
  if (mid.length>0) leviers.push("Axes proches du basculement : " + mid.map(function(r){return r.name+" ("+r.avg.toFixed(1)+")"}).join(", ") + " \u2014 effort cibl\u00e9 = impact rapide.");
  var tia = results.find(function(r){return r.id==="techno_ia"});
  if (tia) leviers.push(tia.avg<3 ? "IA sous-exploit\u00e9e ("+tia.avg.toFixed(1)+"/5) \u2014 levier majeur pour acc\u00e9l\u00e9rer." : "Maturit\u00e9 IA ("+tia.avg.toFixed(1)+"/5) \u2014 levier pour les autres axes.");
  if (leviers.length===0) leviers.push("Axes au-dessus de 3/5 : levier pour tirer les dimensions en retard.");

  var risques = [];
  if (weak.length>=3) risques.push(weak.length+" axes sous formalisation \u2014 risque de dispersion des efforts.");
  else if (weak.length>0) risques.push(weak.length+" axe(s) en retard pouvant freiner la transformation globale.");
  else risques.push("Risque d'essoufflement sans objectifs d'excellence.");
  var proc = results.find(function(r){return r.id==="processus"});
  if (proc && proc.avg<3) risques.push("Processus ("+proc.avg.toFixed(1)+"/5) : risque de non-conformit\u00e9 r\u00e9glementaire (pay transparency).");
  if (risques.length<2) risques.push("\u00c9volutions techno et r\u00e9glementaires imposent une veille active.");

  var forces = [];
  if (strong.length>0) forces.push(strong.map(function(r){return r.name}).join(", ")+" : axes pouvant servir de r\u00e9f\u00e9rence interne.");
  forces.push("Score global "+globalAvg.toFixed(1)+"/5 \u2014 "+(globalAvg>=3?"base solide.":"volont\u00e9 de progresser."));
  var faiblesses = [];
  if (weak.length>0) faiblesses.push(weak.map(function(r){return r.name}).join(", ")+" : sous le seuil de formalisation.");
  faiblesses.push(gap>1.5?"H\u00e9t\u00e9rog\u00e9n\u00e9it\u00e9 marqu\u00e9e ("+gap.toFixed(1)+" pts d'\u00e9cart).":"Progression homog\u00e8ne mais insuffisante sur certains axes.");
  var opportunites = ["Transformation digitale et IA comme catalyseurs.", "Directive pay transparency comme levier de structuration."];
  var menaces = ["R\u00e9glementation (pay transparency, IA Act) imposant des mises en conformit\u00e9.", "Perte de comp\u00e9titivit\u00e9 RH si maturit\u00e9 en de\u00e7\u00e0 du march\u00e9."];

  return {adapted:{atouts:atouts,fragilites:fragilites,leviers:leviers,risques:risques},classic:{forces:forces,faiblesses:faiblesses,opportunites:opportunites,menaces:menaces}};
}

function generateGlobalRecommendation(results, globalAvg) {
  var sorted = results.slice().sort(function(a,b){return a.avg-b.avg});
  var weakest = sorted[0]; var strongest = sorted[sorted.length-1];
  var weak = results.filter(function(r){return r.avg<3});
  if (globalAvg<2) return "Lancer un programme fondateur de structuration RH sur 12 mois, en priorisant "+weakest.name+(sorted[1]?" et "+sorted[1].name:"")+". Nommer un sponsor CODIR, sanctuariser un budget d\u00e9di\u00e9 et poser les premiers processus. Objectif 12 mois : niveau Formalis\u00e9 sur 3 axes minimum.";
  if (globalAvg<3) return "Passer de l'initiative \u00e0 la structuration : formaliser les processus sur "+weak.map(function(r){return r.name}).join(", ")+" sous 6 mois. Capitaliser sur "+strongest.name+" comme mod\u00e8le interne. Prioriser la conformit\u00e9 pay transparency et lancer un pilote IA RH.";
  if (globalAvg<4) return "Ancrer le pilotage par les donn\u00e9es sur tous les axes et viser le mode Pilot\u00e9 sous 12 mois. "+(weak.length>0?"Investissement prioritaire sur "+weak.map(function(r){return r.name}).join(", ")+". ":"")+"Industrialiser l'IA RH et syst\u00e9matiser le lien comp\u00e9tences-r\u00e9mun\u00e9ration.";
  return "Maintenir l'excellence et viser le statut d'organisation r\u00e9f\u00e9rente. Innover sur "+weakest.name+" ("+weakest.avg.toFixed(1)+"/5), d\u00e9ployer le pr\u00e9dictif RH, et se positionner comme benchmark sectoriel.";
}

    h += '<label class="field-label">Mode de diagnostic</label>';
    h += '<div class="mode-row">';
    h += '<div class="mode-btn '+(mode==="flash"?"active":"")+'" onclick="setMode(&#39;flash&#39;)"><h3>\u26a1 Flash</h3><p>3 questions/axe</p></div>';
    h += '<div class="mode-btn '+(mode==="complet"?"active":"")+'" onclick="setMode(&#39;complet&#39;)"><h3>\ud83d\udd0d Complet</h3><p>8 questions/axe</p></div>';
    h += '</div>';

    h += '<label class="field-label">Axes \u00e0 \u00e9valuer</label>';
    h += '<div class="sel-actions"><button class="sel-btn" onclick="selectAll()">Tout s\u00e9lectionner</button><button class="sel-btn" onclick="selectNone()">Tout d\u00e9s\u00e9lectionner</button></div>';
    for (var i = 0; i < ALL_AXES.length; i++) {
      var a = ALL_AXES[i];
      var sel = selectedAxes.indexOf(a.id) !== -1;
      h += '<div class="axis-row'+(sel?" axis-sel":"")+'" style="'+(sel?"border-color:"+a.color+";background:"+a.color+"08":"")+'" onclick="toggleAxis(&#39;'+a.id+'&#39;)">';
      h += '<div class="axis-check" style="'+(sel?"border-color:"+a.color+";background:"+a.color:"")+'">'; 
      if (sel) h += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      h += '</div>';
      h += '<span class="axis-row-name" style="'+(sel?"":"color:#999")+'">' + esc(a.name) + infoIcon(sel ? a.color : "#999", a.desc) + '</span>';
      h += '<span class="axis-row-count">' + getQs(a).length + ' questions</span>';
      h += '</div>';
    }
    h += '<div style="font-size:12px;color:#888;margin:10px 0 20px;text-align:center">' + selectedAxes.length + ' axe'+(selectedAxes.length>1?"s":"")+' s\u00e9lectionn\u00e9'+(selectedAxes.length>1?"s":"")+' \u00b7 ' + getTotalQs() + ' questions</div>';

    var canStart = selectedAxes.length > 0;
    h += '<button class="btn btn-primary" style="width:100%;padding:16px;font-size:16px;'+(canStart?"":"opacity:.4;cursor:not-allowed")+'" onclick="'+(canStart?"startQuiz()":"")+'" '+(canStart?"":"disabled")+'>D\u00e9marrer le diagnostic \u2192</button>';
    h += '<div style="text-align:center;margin-top:16px;font-size:12px;color:#999">\u00c9chelle: Inexistant \u2192 Initi\u00e9 \u2192 Formalis\u00e9 \u2192 Pilot\u00e9 \u2192 Optimis\u00e9</div>';
    app.innerHTML = h; return;
  }

  if (screen === "quiz") {
    var active = getActiveAxes();
    var axis = active[currentAxis], qs = getQs(axis), q = qs[currentQ];
    var total = getTotalQs();
    var done = Object.keys(answers).length;
    if (company) h += '<div style="text-align:center;font-weight:600;color:#1e3a8a;margin-bottom:12px">'+esc(company)+'</div>';
    h += '<div class="progress"><div class="bar-track"><div class="bar-fill" style="width:'+(done/total*100)+'%;background:linear-gradient(90deg,#1e3a8a,#166534)"></div></div>';
    h += '<div style="text-align:right;font-size:12px;color:#888;margin-top:4px">'+done+'/'+total+'</div></div>';
    h += '<div class="card"><div class="axis-title" style="color:'+axis.color+'">'+esc(axis.name)+infoIcon(axis.color, axis.desc)+'</div>';
    h += '<div class="axis-desc">'+esc(axis.desc)+'</div>';
    h += '<div style="font-size:12px;color:#888;margin-bottom:14px">Question '+(currentQ+1)+' sur '+qs.length+'</div>';
    h += '<div class="question"><div class="q-text">'+esc(q.text)+'</div><div class="levels">';
    for(var i=0;i<LEVELS.length;i++){var l=LEVELS[i];var act=answers[q.id]===l.score;var st=act?"border-color:"+l.color+";background:"+l.color+"18;color:"+l.color:"";
      h+='<button class="lvl-btn'+(act?" active":"")+'" style="'+st+'" onclick="doAnswer(&#39;'+q.id+'&#39;,'+l.score+')">'+l.score+'. '+l.label+'</button>';}
    h+='</div></div></div>';
    h+='<div class="nav">';
    h+='<button class="btn" onclick="goPrev()"'+(currentAxis===0&&currentQ===0?" disabled":"")+'>\u2190 Pr\u00e9c\u00e9dent</button>';
    if(done>=total) h+='<button class="btn btn-primary" onclick="showResults()">R\u00e9sultats \u2192</button>';
    h+='<button class="btn" onclick="goNext()"'+(currentAxis===active.length-1&&currentQ===qs.length-1?" disabled":"")+'>Suivant \u2192</button>';
    h+='</div>';
    h+='<div class="card" style="margin-top:20px;padding:16px 20px">';
    h+='<div style="font-size:12px;font-weight:700;margin-bottom:10px;color:#888">Comprendre l\u2019\u00e9chelle</div>';
    h+='<div class="scale-item"><span class="scale-dot" style="background:#e74c3c"></span><span class="scale-label">1. Inexistant</span><span class="scale-desc">\u2014 Aucune pratique en place, le sujet n\u2019est pas adress\u00e9.</span></div>';
    h+='<div class="scale-item"><span class="scale-dot" style="background:#e67e22"></span><span class="scale-label">2. Initi\u00e9</span><span class="scale-desc">\u2014 Premi\u00e8res initiatives isol\u00e9es, non structur\u00e9es ni r\u00e9p\u00e9tables.</span></div>';
    h+='<div class="scale-item"><span class="scale-dot" style="background:#f1c40f"></span><span class="scale-label">3. Formalis\u00e9</span><span class="scale-desc">\u2014 Processus d\u00e9finis, document\u00e9s et appliqu\u00e9s de mani\u00e8re coh\u00e9rente.</span></div>';
    h+='<div class="scale-item"><span class="scale-dot" style="background:#2ecc71"></span><span class="scale-label">4. Pilot\u00e9</span><span class="scale-desc">\u2014 Processus mesur\u00e9s par des indicateurs, ajust\u00e9s r\u00e9guli\u00e8rement.</span></div>';
    h+='<div class="scale-item"><span class="scale-dot" style="background:#1abc9c"></span><span class="scale-label">5. Optimis\u00e9</span><span class="scale-desc">\u2014 Am\u00e9lioration continue, le sujet est une r\u00e9f\u00e9rence dans l\u2019organisation.</span></div>';
    h+='</div>';
    app.innerHTML=h;return;
  }

  // Results
  var results=computeResults();
  var globalAvg=results.reduce(function(s,r){return s+r.avg},0)/results.length;
  var gl=getGlobalLevel(globalAvg);
  var dt=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

  h+='<h1>R\u00e9sultats du diagnostic</h1>';
  if(company) h+='<div style="text-align:center;font-weight:600;color:#1e3a8a;margin:8px 0">'+esc(company)+'</div>';
  h+='<div style="text-align:center;font-size:13px;color:#888;margin-bottom:24px">'+dt+' \u00b7 Mode '+(mode==="flash"?"Flash":"Complet")+'</div>';
  h+='<div class="result-box" style="background:'+gl.color+'12;border:2px solid '+gl.color+'40"><div class="score-big" style="color:'+gl.color+'">'+globalAvg.toFixed(1)+'<span class="score-unit">/5</span></div><div class="badge" style="background:'+gl.color+'">Niveau '+gl.label+'</div><div style="font-size:13px;color:#666;margin-top:8px">'+gl.desc+'</div>';
  h+='<div style="text-align:center;margin-top:16px"><span style="display:inline-block;padding:10px 20px;border-radius:99px;background:#1a1a2e;color:#fff;font-size:13px;font-weight:700;letter-spacing:0.3px">Synth\u00e8se du diagnostic : '+generateSynthesis(globalAvg)+'</span></div></div>';

  var swot=generateSWOT(results,globalAvg);
  var sa=swot.adapted;
  var quads=[{t:"Atouts",icon:"\u2705",items:sa.atouts,c:"#059669"},{t:"Fragilit\u00e9s",icon:"\u26a0\ufe0f",items:sa.fragilites,c:"#e74c3c"},{t:"Leviers",icon:"\ud83d\ude80",items:sa.leviers,c:"#2563eb"},{t:"Risques",icon:"\ud83d\udee1\ufe0f",items:sa.risques,c:"#e67e22"}];
  h+='<div class="card" style="margin-bottom:24px"><h3 style="font-size:16px;font-weight:700;margin:0 0 16px">\ud83d\udcca Analyse strat\u00e9gique</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  for(var qi=0;qi<quads.length;qi++){var qq=quads[qi];h+='<div style="padding:16px;border-radius:12px;background:'+qq.c+'08;border-left:4px solid '+qq.c+'"><div style="font-size:13px;font-weight:700;color:'+qq.c+';margin-bottom:8px">'+qq.icon+' '+qq.t+'</div>';for(var qj=0;qj<qq.items.length;qj++){h+='<div style="font-size:12px;line-height:1.6;color:#555;margin-bottom:6px">\u2022 '+qq.items[qj]+'</div>';}h+='</div>';}
  h+='</div>';

  var sc=swot.classic;
  h+='<details style="margin-top:20px"><summary style="font-size:13px;font-weight:600;color:#666;cursor:pointer">\ud83d\udcce SWOT classique (annexe)</summary><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">';
  var cq=[{t:"Forces",items:sc.forces,c:"#059669"},{t:"Faiblesses",items:sc.faiblesses,c:"#e74c3c"},{t:"Opportunit\u00e9s",items:sc.opportunites,c:"#2563eb"},{t:"Menaces",items:sc.menaces,c:"#e67e22"}];
  for(var ci=0;ci<cq.length;ci++){var cc=cq[ci];h+='<div style="padding:12px;border-radius:10px;background:#f8f8f8"><div style="font-size:12px;font-weight:700;color:'+cc.c+';margin-bottom:6px">'+cc.t+'</div>';for(var cj=0;cj<cc.items.length;cj++){h+='<div style="font-size:11px;line-height:1.5;color:#666;margin-bottom:4px">\u2022 '+cc.items[cj]+'</div>';}h+='</div>';}
  h+='</div></details></div>';

  h+='<div style="background:linear-gradient(135deg,#1e3a8a08,#15803d08);border:2px solid #1e3a8a20;border-radius:16px;padding:24px;margin-bottom:24px"><h3 style="font-size:16px;font-weight:700;margin:0 0 12px">\ud83c\udfaf Recommandation globale</h3><div style="font-size:14px;line-height:1.7;color:#1a1a2e;font-weight:500">'+generateGlobalRecommendation(results,globalAvg)+'</div></div>';

  h+='<div class="card"><h3 style="font-size:16px;font-weight:700;margin-bottom:8px;text-align:center">Radar de maturit\u00e9</h3>'+drawRadar(results)+'</div>';

  h+='<div class="card"><h3 style="font-size:16px;font-weight:700;margin-bottom:18px">D\u00e9tail par axe</h3>';
  for(var i=0;i<results.length;i++){var r=results[i];
    h+='<div class="axis-result"><div class="axis-result-header"><span class="axis-result-name">'+esc(r.name)+infoIcon(r.color, r.desc)+'</span><span class="axis-result-score" style="background:'+r.level.color+'20;color:'+r.level.color+'">'+r.avg.toFixed(1)+'/5 \u00b7 '+r.level.label+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+(r.avg/5*100)+'%;background:'+r.color+'"></div></div></div>';}
  h+='</div>';

  h+='<div class="card"><h3 style="font-size:16px;font-weight:700;margin-bottom:18px">Recommandations</h3>';
  for(var i=0;i<results.length;i++){var r=results[i];var lvl=Math.max(1,Math.min(5,Math.round(r.avg)));
    var recoItems=RECO[r.id][String(lvl)];h+='<div class="reco" style="border-color:'+r.color+';background:'+r.color+'08"><div class="reco-title" style="color:'+r.color+'">'+esc(r.name)+infoIcon(r.color, r.desc)+'</div><div class="reco-text"><ul style="margin:0;padding-left:18px">';for(var ri=0;ri<recoItems.length;ri++){h+='<li style="margin-bottom:4px">'+esc(recoItems[ri])+'</li>';}h+='</ul></div></div>';}
  h+='</div>';

  h+='<div style="position:relative;margin-bottom:12px">';
  h+='<button class="btn btn-primary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px" onclick="toggleExport()">Exporter les r\u00e9sultats <span style="font-size:10px;transform:rotate('+(showExportMenu?180:0)+'deg);transition:transform .2s">\u25bc</span></button>';
  if(showExportMenu){
    h+='<div class="export-dropdown">';
    h+='<button class="export-opt" onclick="window.print();showExportMenu=false;render()"><div class="export-icon" style="background:#e74c3c14"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></div><div><div class="export-label">PDF</div><div class="export-sub">Impression / PDF</div></div></button>';
    h+='<button class="export-opt" onclick="exportCSVResults();showExportMenu=false;render()"><div class="export-icon" style="background:#27ae6014"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></div><div><div class="export-label">Excel</div><div class="export-sub">Tableur CSV avec d\u00e9tail</div></div></button>';
    h+='<button class="export-opt" onclick="exportPPTResults();showExportMenu=false;render()"><div class="export-icon" style="background:#e67e2214"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg></div><div><div class="export-label">Pr\u00e9sentation</div><div class="export-sub">Slides HTML imprimables</div></div></button>';
    h+='</div>';}
  h+='</div>';
  h+='<button class="btn" style="width:100%" onclick="goHome()">Nouveau diagnostic</button>';
  app.innerHTML=h;
}
render();
</script>
</body></html>
