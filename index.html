<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diagnostic de Maturité GEPP/SBO</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Segoe UI","DM Sans",system-ui,sans-serif;background:#f5f7fa;color:#1a1a2e;line-height:1.5}.container{max-width:680px;margin:0 auto;padding:24px 16px}h1{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px}h2{font-size:15px;font-weight:500;color:#666;text-align:center;margin:0 0 24px}.card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:24px;margin-bottom:20px}.axis-title{font-size:18px;font-weight:800;margin-bottom:4px}.axis-desc{font-size:12px;color:#888;margin-bottom:16px}.question{margin-bottom:20px}.q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}.levels{display:flex;gap:6px;flex-wrap:wrap}.lvl-btn{padding:8px 14px;border-radius:8px;border:2px solid #e2e2e2;background:#fff;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:inherit}.lvl-btn.active{font-weight:700}.lvl-btn:hover{border-color:#ccc}.result-box{text-align:center;padding:32px 24px;border-radius:16px;margin-bottom:20px}.score-big{font-size:56px;font-weight:900;line-height:1}.score-unit{font-size:22px;font-weight:400}.badge{display:inline-block;padding:6px 20px;border-radius:99px;font-weight:700;font-size:14px;color:#fff;margin-top:12px}.bar-track{background:#f0f0f0;border-radius:99px;height:12px;width:100%;overflow:hidden}.bar-fill{height:12px;border-radius:99px;transition:width .5s}.axis-result{margin-bottom:16px}.axis-result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.axis-result-name{font-size:14px;font-weight:600}.axis-result-score{font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}.reco{padding:16px;border-radius:12px;margin-bottom:12px;border-left:4px solid}.reco-title{font-size:14px;font-weight:700;margin-bottom:4px}.reco-text{font-size:13px;color:#555;line-height:1.6}.nav{display:flex;gap:12px;justify-content:space-between;margin-top:16px}.btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:2px solid #e2e2e2;background:#fff}.btn-primary{border:none;background:linear-gradient(135deg,#1e3a8a,#15803d);color:#fff;font-weight:700}.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}.progress{margin-bottom:24px}.export-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.export-row .btn{flex:1;min-width:140px;text-align:center}.mode-row{display:flex;gap:12px;margin-bottom:24px}.mode-btn{flex:1;padding:16px;border-radius:12px;border:2px solid #e2e2e2;background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}.mode-btn.active{border-color:#1e3a8a;background:#1e3a8a08}.mode-btn h3{font-size:16px;margin:0}.mode-btn p{font-size:12px;color:#888;margin:4px 0 0}.company-input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #e2e2e2;font-size:15px;font-family:inherit;margin-bottom:20px}.company-input:focus{outline:none;border-color:#1e3a8a}</style></head><body><div class="container" id="app"></div><script>var ALL_AXES=[{"id":"gouvernance","name":"Gouvernance & Stratégie RH","color":"#1e3a8a","desc":"Évalue la manière dont la stratégie RH est définie, pilotée et alignée sur les objectifs globaux de l'entreprise : instances de décision, sponsoring de la direction, budget dédié et dialogue social.","questions":[{"id":"g1","text":"Comment qualifieriez-vous la formalisation de votre stratégie RH et son alignement avec la stratégie globale de l'entreprise ?","flash":true},{"id":"g2","text":"Où en est votre organisation concernant le pilotage de la GEPP (comité compétences, comité carrières…) ?","flash":true},{"id":"g3","text":"Comment évalueriez-vous le suivi régulier de vos indicateurs RH clés (turnover, mobilité, couverture de compétences) ?","flash":true},{"id":"g4","text":"Dans quelle mesure la direction générale porte-t-elle et sponsorise-t-elle la démarche compétences ?","flash":false},{"id":"g5","text":"Comment qualifieriez-vous l'identification et la sanctuarisation d'un budget dédié aux compétences (formation, outils, conseil) ?","flash":false},{"id":"g6","text":"Où en êtes-vous dans la construction d'une roadmap pluriannuelle de transformation des compétences ?","flash":false},{"id":"g7","text":"Comment décririez-vous l'implication des partenaires sociaux dans la démarche GEPP (accord, charte, instances…) ?","flash":false},{"id":"g8","text":"Dans quelle mesure la fonction RH dispose-t-elle de ressources dédiées à l'ingénierie des compétences (hors administration courante) ?","flash":false}]},{"id":"referentiels","name":"Référentiels de compétences","color":"#2563eb","desc":"Mesure l'existence, la complétude et la mise à jour des référentiels de compétences : couverture métier, niveaux de maîtrise, intégration des compétences émergentes et appropriation par les collaborateurs.","questions":[{"id":"r1","text":"Comment qualifieriez-vous la couverture de votre référentiel de compétences sur l'ensemble des métiers de l'organisation ?","flash":true},{"id":"r2","text":"Dans quelle mesure votre référentiel distingue-t-il compétences techniques, transverses et comportementales ?","flash":true},{"id":"r3","text":"Comment évalueriez-vous le processus de mise à jour régulière de votre référentiel de compétences ?","flash":true},{"id":"r4","text":"Où en êtes-vous dans l'intégration de niveaux de maîtrise attendus par compétence dans vos fiches métiers ?","flash":false},{"id":"r5","text":"Comment qualifieriez-vous la prise en compte des compétences émergentes (IA, data, transition écologique…) dans votre référentiel ?","flash":false},{"id":"r6","text":"Dans quelle mesure les managers et collaborateurs contribuent-ils à la construction et à la mise à jour du référentiel ?","flash":false},{"id":"r7","text":"Comment décririez-vous l'accessibilité et la compréhension du référentiel par l'ensemble des collaborateurs ?","flash":false},{"id":"r8","text":"Où en est votre organisation concernant l'existence d'un dictionnaire de compétences avec des descripteurs comportementaux par niveau ?","flash":false}]},{"id":"processus","name":"Processus GEPP","color":"#3b82f6","desc":"Analyse la structuration des processus de gestion des emplois et des parcours professionnels : entretiens, people review, mobilité interne, cartographie des emplois et plans de développement individuels.","questions":[{"id":"p1","text":"Comment qualifieriez-vous l'intégration de l'évaluation des compétences dans vos entretiens annuels et professionnels ?","flash":true},{"id":"p2","text":"Où en est votre organisation concernant la structuration d'un processus de revue des talents (people review) ?","flash":true},{"id":"p3","text":"Dans quelle mesure votre plan de développement des compétences est-il articulé avec les besoins réellement identifiés ?","flash":true},{"id":"p4","text":"Comment évalueriez-vous votre dispositif de détection et de gestion des hauts potentiels ?","flash":false},{"id":"p5","text":"Comment décririez-vous la formalisation et la communication des parcours de mobilité interne ?","flash":false},{"id":"p6","text":"Où en êtes-vous dans la construction d'une cartographie dynamique des emplois sensibles, en tension et émergents ?","flash":false},{"id":"p7","text":"Dans quelle mesure votre processus de recrutement s'appuie-t-il sur les référentiels de compétences pour définir les profils recherchés ?","flash":false},{"id":"p8","text":"Comment qualifieriez-vous le traitement des écarts entre compétences détenues et compétences cibles (plans d'action individuels) ?","flash":false}]},{"id":"outils","name":"Outils & Digitalisation","color":"#0891b2","desc":"Évalue le niveau d'outillage digital au service de la gestion des compétences : SIRH, LMS, tableaux de bord, analytique RH, interopérabilité et fiabilité des données.","questions":[{"id":"o1","text":"Comment évalueriez-vous votre SIRH en matière de gestion des compétences ?","flash":true},{"id":"o2","text":"Où en est votre organisation concernant la possibilité pour les collaborateurs d'auto-évaluer et déclarer leurs compétences via un outil digital ?","flash":true},{"id":"o3","text":"Comment qualifieriez-vous vos tableaux de bord RH pour le pilotage de la GEPP ?","flash":true},{"id":"o4","text":"Dans quelle mesure votre LMS (plateforme de formation) est-il en place et connecté aux besoins en compétences ?","flash":false},{"id":"o5","text":"Où en êtes-vous dans l'utilisation de l'IA ou de l'analytique RH pour anticiper les besoins en compétences ?","flash":false},{"id":"o6","text":"Comment décririez-vous la couverture digitale du cycle complet : évaluation → analyse des écarts → plan de développement ?","flash":false},{"id":"o7","text":"Comment évalueriez-vous la fiabilité et l'exploitabilité de vos données compétences pour la prise de décision ?","flash":false},{"id":"o8","text":"Dans quelle mesure vos outils RH (SIRH, LMS, ATS, BI…) sont-ils interconnectés et interopérables ?","flash":false}]},{"id":"operations","name":"Opérations","color":"#0d9488","desc":"Mesure la maturité des processus opérationnels : standardisation, indicateurs de performance, amélioration continue, clarté des rôles et coordination inter-fonctions.","questions":[{"id":"op1","text":"Comment qualifieriez-vous la documentation et la standardisation de vos processus opérationnels clés ?","flash":true},{"id":"op2","text":"Où en est votre organisation concernant le suivi d'indicateurs de performance opérationnelle (productivité, qualité, délais) ?","flash":true},{"id":"op3","text":"Dans quelle mesure les compétences de vos équipes opérationnelles sont-elles en adéquation avec les objectifs fixés ?","flash":true},{"id":"op4","text":"Comment évalueriez-vous le déploiement de démarches d'amélioration continue (Lean, Kaizen, Six Sigma…) ?","flash":false},{"id":"op5","text":"Comment décririez-vous la clarté et la communication des rôles et responsabilités au sein des équipes opérationnelles ?","flash":false},{"id":"op6","text":"Dans quelle mesure les retours terrain (incidents, non-conformités, suggestions) sont-ils collectés et exploités de façon systématique ?","flash":false},{"id":"op7","text":"Où en êtes-vous concernant l'audit et l'optimisation régulière de vos processus opérationnels ?","flash":false},{"id":"op8","text":"Comment qualifieriez-vous la fluidité de la coordination entre vos fonctions opérationnelles (production, logistique, qualité…) ?","flash":false}]},{"id":"planification","name":"Planification","color":"#059669","desc":"Analyse la capacité de l'organisation à anticiper ses besoins en ressources et compétences : planification annuelle, workforce planning, scénarios prospectifs et prise en compte des départs prévisibles.","questions":[{"id":"pl1","text":"Comment évalueriez-vous la formalisation de votre processus de planification annuelle (budget, effectifs, compétences) ?","flash":true},{"id":"pl2","text":"Dans quelle mesure votre planification RH intègre-t-elle les évolutions prévisibles de l'activité ?","flash":true},{"id":"pl3","text":"Où en est votre organisation concernant la modélisation de scénarios prospectifs (croissance, décroissance, transformation) ?","flash":true},{"id":"pl4","text":"Comment qualifieriez-vous l'articulation entre votre workforce planning et le plan stratégique de l'entreprise ?","flash":false},{"id":"pl5","text":"Comment décririez-vous l'anticipation de vos besoins en recrutement et en mobilité à horizon 12-36 mois ?","flash":false},{"id":"pl6","text":"Dans quelle mesure les départs prévisibles (retraites, turnover structurel) sont-ils intégrés à votre planification ?","flash":false},{"id":"pl7","text":"Où en êtes-vous dans l'utilisation d'outils de simulation et de modélisation pour la planification des effectifs ?","flash":false},{"id":"pl8","text":"Comment évalueriez-vous votre capacité à réviser et ajuster la planification en cours d'année ?","flash":false}]},{"id":"pilotage","name":"Pilotage stratégique","color":"#15803d","desc":"Évalue la capacité de pilotage au niveau stratégique : déclinaison de la vision en objectifs, revues stratégiques, tableaux de bord, gestion des risques et alignement stratégie-organisation-compétences.","questions":[{"id":"ps1","text":"Comment qualifieriez-vous la déclinaison de votre vision stratégique en objectifs mesurables et communiqués à tous les niveaux ?","flash":true},{"id":"ps2","text":"Où en est votre organisation concernant la tenue de revues stratégiques régulières (trimestrielles ou semestrielles) ?","flash":true},{"id":"ps3","text":"Dans quelle mesure vos décisions stratégiques s'appuient-elles sur des données fiables et actualisées ?","flash":true},{"id":"ps4","text":"Comment évalueriez-vous votre tableau de bord stratégique (balanced scorecard ou équivalent) ?","flash":false},{"id":"ps5","text":"Comment décririez-vous l'évaluation périodique de l'alignement entre stratégie, organisation et compétences ?","flash":false},{"id":"ps6","text":"Où en êtes-vous dans la cartographie et le suivi de vos risques stratégiques (marché, réglementaire, technologique, RH) ?","flash":false},{"id":"ps7","text":"Dans quelle mesure le CODIR/COMEX dispose-t-il d'une vision consolidée de la maturité organisationnelle ?","flash":false},{"id":"ps8","text":"Comment qualifieriez-vous l'évaluation régulière de votre capacité d'exécution stratégique (ressources, compétences, gouvernance) ?","flash":false}]}];
var LEVELS=[{"score":1,"label":"Inexistant","color":"#e74c3c","desc":"Aucune pratique en place"},{"score":2,"label":"Initié","color":"#e67e22","desc":"Premières initiatives, non structurées"},{"score":3,"label":"Formalisé","color":"#f1c40f","desc":"Processus définis et documentés"},{"score":4,"label":"Piloté","color":"#2ecc71","desc":"Processus mesurés et améliorés"},{"score":5,"label":"Optimisé","color":"#1abc9c","desc":"Amélioration continue, référence"}];
var RECO={"gouvernance":{"1":"Priorité : formaliser une stratégie RH écrite, nommer un sponsor GEPP en CODIR et poser les premiers KPI.","2":"Structurer un comité de pilotage GEPP avec une fréquence trimestrielle et des objectifs mesurables.","3":"Renforcer le lien stratégie business ↔ stratégie compétences. Négocier un accord GEPP avec les IRP.","4":"Affiner le pilotage par les données. Challenger la roadmap compétences lors des revues stratégiques.","5":"Maintenir l'excellence : benchmark externe, innovation RH, partage de bonnes pratiques sectorielles."},"referentiels":{"1":"Démarrer par un référentiel simplifié sur les 5 à 10 emplois clés. Privilégier l'opérationnel à l'exhaustivité.","2":"Compléter le référentiel avec des niveaux de maîtrise et intégrer les compétences transverses.","3":"Impliquer les managers dans la mise à jour et intégrer les compétences émergentes (IA, green skills…).","4":"Automatiser la mise à jour via le SIRH et lier le référentiel aux processus d'évaluation et de formation.","5":"Référentiel vivant et prédictif : anticiper les compétences futures via la veille métier et l'IA."},"processus":{"1":"Instaurer a minima l'entretien professionnel avec un volet compétences structuré.","2":"Mettre en place une première people review et relier le plan de formation aux écarts identifiés.","3":"Formaliser les parcours de mobilité et créer une cartographie des emplois sensibles.","4":"Systématiser les plans de développement individuels et mesurer leur impact sur la performance.","5":"Processus auto-apprenant : feedback continu, IA prédictive sur les mobilités, learning in the flow of work."},"outils":{"1":"Identifier un outil simple (même un tableur structuré) pour centraliser les données compétences.","2":"Déployer un module compétences dans le SIRH existant et former les managers à son utilisation.","3":"Connecter le SIRH au LMS et aux tableaux de bord. Permettre l'auto-déclaration des compétences.","4":"Exploiter l'analytique RH pour le prédictif. Assurer l'interopérabilité de l'écosystème outils.","5":"IA au service de la GEPP : matching compétences, recommandations de formation, workforce planning automatisé."},"operations":{"1":"Priorité : documenter les 5 à 10 processus opérationnels critiques et définir des indicateurs de base.","2":"Standardiser les processus clés et mettre en place un suivi régulier des KPI opérationnels.","3":"Déployer une démarche d'amélioration continue et systématiser les retours d'expérience terrain.","4":"Optimiser la coordination inter-fonctions et automatiser le reporting opérationnel.","5":"Excellence opérationnelle : processus auto-adaptatifs, prédictif basé sur les données, benchmarking continu."},"planification":{"1":"Instaurer un cycle de planification annuel minimum intégrant effectifs, compétences et budget.","2":"Relier la planification RH aux prévisions d'activité et anticiper les départs prévisibles.","3":"Modéliser des scénarios prospectifs et formaliser un workforce planning à 12-36 mois.","4":"Outiller la planification avec des outils de simulation et intégrer les revues d'ajustement trimestrielles.","5":"Planification dynamique et prédictive : IA, jumeaux numériques organisationnels, ajustement en temps réel."},"pilotage":{"1":"Formaliser la vision stratégique et la décliner en objectifs mesurables communiqués à tous les niveaux.","2":"Mettre en place des revues stratégiques régulières et un premier tableau de bord de pilotage.","3":"Déployer un balanced scorecard et cartographier les risques stratégiques majeurs.","4":"Évaluer périodiquement l'alignement stratégie-organisation-compétences et challenger la capacité d'exécution.","5":"Pilotage agile et data-driven : tableaux de bord temps réel, IA décisionnelle, gouvernance adaptative."}};
var answers={},currentAxis=0,currentQ=0,screen="home",mode="flash",company="";
function getQs(a){return mode==="flash"?a.questions.filter(function(q){return q.flash}):a.questions}
function getLevelInfo(s){var c=Math.max(1,Math.min(5,Math.round(s)));return LEVELS[c-1]}
function getGlobalLevel(a){if(a<=1.5)return LEVELS[0];if(a<=2.5)return LEVELS[1];if(a<=3.5)return LEVELS[2];if(a<=4.5)return LEVELS[3];return LEVELS[4]}
function render(){
  var app=document.getElementById("app");
  if(screen==="home"){
    var h="<h1>Diagnostic de Maturité</h1><h2>GEPP / SBO / Compétences</h2>";
    h+="<input class=\"company-input\" placeholder=\"Nom de l’entreprise…\" value=\""+company+"\" oninput=\"company=this.value\" />";
    h+="<div class=\"mode-row\">";
    h+="<div class=\"mode-btn "+(mode==="flash"?"active":"")+"\" onclick=\"mode=’flash’;render()\">";
    h+="<h3>⚡ Flash</h3><p>3 questions/axe</p></div>";
    h+="<div class=\"mode-btn "+(mode==="complet"?"active":"")+"\" onclick=\"mode=’complet’;render()\">";
    h+="<h3>🔍 Complet</h3><p>8 questions/axe</p></div></div>";
    var total=ALL_AXES.reduce(function(s,a){return s+getQs(a).length},0);
    h+="<button class=\"btn btn-primary\" style=\"width:100%;padding:16px;font-size:16px\" onclick=\"answers={};currentAxis=0;currentQ=0;screen=’quiz’;render()\">Démarrer ("+total+" questions) →</button>";
    h+="<div style=\"text-align:center;margin-top:16px;font-size:12px;color:#999\">Échelle: Inexistant → Initié → Formalisé → Piloté → Optimisé</div>";
    app.innerHTML=h;return;
  }
  if(screen==="quiz"){
    var axis=ALL_AXES[currentAxis],qs=getQs(axis),q=qs[currentQ];
    var total=ALL_AXES.reduce(function(s,a){return s+getQs(a).length},0);
    var done=Object.keys(answers).length;
    var h="";
    if(company)h+="<div style=\"text-align:center;font-weight:600;color:#1e3a8a;margin-bottom:12px\">"+company+"</div>";
    h+="<div class=\"progress\"><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:"+(done/total*100)+"%;background:linear-gradient(90deg,#1e3a8a,#15803d)\"></div></div><div style=\"text-align:right;font-size:12px;color:#888;margin-top:4px\">"+done+"/"+total+"</div></div>";
    h+="<div class=\"card\">";
    h+="<div class=\"axis-title\" style=\"color:"+axis.color+"\">"+axis.name+"</div>";
    h+="<div class=\"axis-desc\">"+axis.desc+"</div>";
    h+="<div style=\"font-size:12px;color:#888;margin-bottom:14px\">Question "+(currentQ+1)+" sur "+qs.length+"</div>";
    h+="<div class=\"question\"><div class=\"q-text\">"+q.text+"</div><div class=\"levels\">";
    LEVELS.forEach(function(l){
      var active=answers[q.id]===l.score;
      h+="<button class=\"lvl-btn"+(active?" active":"")+"\" style=\""+(active?"border-color:"+l.color+";background:"+l.color+"18;color:"+l.color:"")+"\" onclick=\"doAnswer(\\\'"+ q.id+"\\\',"+l.score+")\">"+l.score+". "+l.label+"</button>";
    });
    h+="</div></div></div>";
    h+="<div class=\"nav\">";
    h+="<button class=\"btn\" onclick=\"goPrev()\""+(currentAxis===0&&currentQ===0?" disabled":"")+">← Précédent</button>";
    if(done>=total)h+="<button class=\"btn btn-primary\" onclick=\"screen=’results’;render()\">Résultats →</button>";
    h+="<button class=\"btn\" onclick=\"goNext()\""+(currentAxis===ALL_AXES.length-1&&currentQ===qs.length-1?" disabled":"")+">Suivant →</button>";
    h+="</div>";
    app.innerHTML=h;return;
  }
  var results=ALL_AXES.map(function(a){var sc=getQs(a).map(function(q){return answers[q.id]||0}).filter(function(s){return s>0});var avg=sc.length?sc.reduce(function(x,y){return x+y},0)/sc.length:0;return{id:a.id,name:a.name,color:a.color,desc:a.desc,questions:a.questions,avg:Math.round(avg*100)/100,level:getLevelInfo(avg)}});
  var globalAvg=results.reduce(function(s,r){return s+r.avg},0)/results.length;
  var gl=getGlobalLevel(globalAvg);
  var dt=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  var h="<h1>Résultats du diagnostic</h1>";
  if(company)h+="<div style=\"text-align:center;font-weight:600;color:#1e3a8a;margin:8px 0\">"+company+"</div>";
  h+="<div style=\"text-align:center;font-size:13px;color:#888;margin-bottom:24px\">"+dt+" · Mode "+(mode==="flash"?"Flash":"Complet")+"</div>";
  h+="<div class=\"result-box\" style=\"background:"+gl.color+"12;border:2px solid "+gl.color+"40\"><div class=\"score-big\" style=\"color:"+gl.color+"\">"+globalAvg.toFixed(1)+"<span class=\"score-unit\">/5</span></div><div class=\"badge\" style=\"background:"+gl.color+"\">Niveau "+gl.label+"</div><div style=\"font-size:13px;color:#666;margin-top:8px\">"+gl.desc+"</div></div>";
  h+="<div class=\"card\"><h3 style=\"font-size:16px;font-weight:700;margin-bottom:18px\">Détail par axe</h3>";
  results.forEach(function(r){h+="<div class=\"axis-result\"><div class=\"axis-result-header\"><span class=\"axis-result-name\">"+r.name+"</span><span class=\"axis-result-score\" style=\"background:"+r.level.color+"20;color:"+r.level.color+"\">"+r.avg.toFixed(1)+"/5 · "+r.level.label+"</span></div><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:"+(r.avg/5*100)+"%;background:"+r.color+"\"></div></div></div>"});
  h+="</div>";
  h+="<div class=\"card\"><h3 style=\"font-size:16px;font-weight:700;margin-bottom:18px\">Recommandations</h3>";
  results.forEach(function(r){var lvl=Math.max(1,Math.min(5,Math.round(r.avg)));h+="<div class=\"reco\" style=\"border-color:"+r.color+";background:"+r.color+"08\"><div class=\"reco-title\" style=\"color:"+r.color+"\">"+r.name+"</div><div class=\"reco-text\">"+RECO[r.id][lvl]+"</div></div>"});
  h+="</div>";
  h+="<div class=\"export-row\"><button class=\"btn btn-primary\" onclick=\"window.print()\">Exporter en PDF</button><button class=\"btn\" onclick=\"screen=’home’;answers={};render()\">Nouveau diagnostic</button></div>";
  app.innerHTML=h;
}
function doAnswer(qid,score){answers[qid]=score;setTimeout(function(){var qs=getQs(ALL_AXES[currentAxis]);if(currentQ<qs.length-1)currentQ++;else if(currentAxis<ALL_AXES.length-1){currentAxis++;currentQ=0}render()},200)}
function goPrev(){if(currentQ>0)currentQ--;else if(currentAxis>0){currentAxis--;currentQ=getQs(ALL_AXES[currentAxis]).length-1}render()}
function goNext(){var qs=getQs(ALL_AXES[currentAxis]);if(currentQ<qs.length-1)currentQ++;else if(currentAxis<ALL_AXES.length-1){currentAxis++;currentQ=0}render()}
render();
</script></body></html>
